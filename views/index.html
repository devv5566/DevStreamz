<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchFlix Setup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #111827;
            color: #e5e7eb;
        }
        .wrap {
            max-width: 760px;
            margin: 40px auto;
            padding: 24px;
            background: #1f2937;
            border-radius: 10px;
        }
        h1 { margin-top: 0; }
        .row { margin-bottom: 14px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; }
        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #374151;
            background: #111827;
            color: #e5e7eb;
        }
        .providers {
            display: flex;
            gap: 18px;
            margin-top: 8px;
        }
        .providers label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        .btn {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 14px;
            border: 0;
            border-radius: 6px;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
        }
        .btn.secondary {
            background: #374151;
            margin-left: 8px;
        }
        .output {
            margin-top: 18px;
            padding: 12px;
            background: #111827;
            border: 1px solid #374151;
            border-radius: 6px;
            word-break: break-all;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>WatchFlix by DevStreamz</h1>
        <p>This setup includes only ShowBox and 4KHDHub providers.</p>

        <div class="row">
            <label for="cookieInput">FebBox Cookie (optional, for ShowBox)</label>
            <input id="cookieInput" type="text" placeholder="ui=your_cookie_value">
        </div>

        <div class="row">
            <label for="regionSelect">Region (ShowBox)</label>
            <select id="regionSelect">
                <option value="">Default</option>
                <option value="USA7">USA7</option>
                <option value="IN1">IN1</option>
                <option value="SG1">SG1</option>
            </select>
        </div>

        <div class="row">
            <label>Providers</label>
            <div class="providers">
                <label><input id="providerShowbox" type="checkbox" checked> ShowBox</label>
                <label><input id="provider4khdhub" type="checkbox" checked> 4KHDHub</label>
            </div>
        </div>

        <button id="generateBtn" class="btn">Generate Install URL</button>
        <button id="copyBtn" class="btn secondary">Copy Manifest URL</button>
        <a id="installBtn" class="btn secondary" href="#">Install Addon</a>

        <div class="output">
            <strong>Manifest URL:</strong>
            <div id="manifestUrl"></div>
        </div>
    </div>

    <script>
        const cookieInput = document.getElementById('cookieInput');
        const regionSelect = document.getElementById('regionSelect');
        const providerShowbox = document.getElementById('providerShowbox');
        const provider4khdhub = document.getElementById('provider4khdhub');
        const manifestUrlEl = document.getElementById('manifestUrl');
        const installBtn = document.getElementById('installBtn');
        const copyBtn = document.getElementById('copyBtn');
        const generateBtn = document.getElementById('generateBtn');

        function buildManifestUrl() {
            const providers = [];
            if (providerShowbox.checked) providers.push('showbox');
            if (provider4khdhub.checked) providers.push('4khdhub');

            const pathParts = [];
            const cookie = cookieInput.value.trim();
            const region = regionSelect.value.trim();

            if (cookie) pathParts.push(`cookie=${encodeURIComponent(cookie)}`);
            if (region) pathParts.push(`region=${encodeURIComponent(region)}`);
            if (providers.length > 0 && providers.length < 2) {
                pathParts.push(`providers=${providers.join(',')}`);
            }

            const pathPrefix = pathParts.length > 0 ? `/${pathParts.join('/')}` : '';
            return `${window.location.origin}${pathPrefix}/manifest.json`;
        }

        function refreshUrls() {
            const manifestUrl = buildManifestUrl();
            const installUrl = `stremio://${manifestUrl.replace(/^https?:\/\//, '')}`;
            manifestUrlEl.textContent = manifestUrl;
            installBtn.href = installUrl;
        }

        generateBtn.addEventListener('click', refreshUrls);
        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(manifestUrlEl.textContent);
            } catch (e) {
                console.error('Copy failed', e);
            }
        });

        refreshUrls();
    </script>
</body>
</html>
